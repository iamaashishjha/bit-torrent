{{ define "content" }}
<h1>Settings</h1>
<form hx-post="/api/settings" hx-target="body" hx-swap="none" class="settings-form">
    <div class="form-group">
        <label>Default Download Directory</label>
        <input type="text" name="default_dir" value="{{ .settings.DefaultDir }}">
    </div>
    <div class="form-group">
        <label>Listen Port</label>
        <input type="number" name="port" value="{{ .settings.Port }}" min="1024" max="65535">
    </div>
    <div class="form-group">
        <label>Max Active Downloads</label>
        <input type="number" name="max_active" value="{{ .settings.MaxActive }}" min="1" max="50">
    </div>
    <div class="form-group">
        <label>Max Download Speed (0 = unlimited)</label>
        <input type="number" name="max_download_speed" value="{{ .settings.MaxDownloadSpeed }}" min="0" step="100000">
    </div>
    <div class="form-group">
        <label>Max Upload Speed (0 = unlimited)</label>
        <input type="number" name="max_upload_speed" value="{{ .settings.MaxUploadSpeed }}" min="0" step="100000">
    </div>
    <button type="submit" class="btn">Save</button>
</form>
{{ end }}
